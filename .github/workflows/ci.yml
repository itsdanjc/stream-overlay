# This workflow will build using node and then publish a package to npm when a release is created

name: Build and Publish to npm

on:
  release:
    types: [created]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
        
      - run: npm ci
      - run: npm run build
      - run: npm publish
